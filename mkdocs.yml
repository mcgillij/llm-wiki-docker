site_name: 3dSpace Wiki
site_description: Technical knowledge base for the 3dSpace project
docs_dir: content
repo_url: https://github.com/user/3d-space
edit_uri: edit/main/wiki/content/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Log: log.md
  - Schema: SCHEMA.md
  - Entities:
    - Autoloads & Singletons:
      - Faction Manager: entities/faction-manager.md
      - Patrol Manager: entities/patrol-manager.md
      - NPC Simulation Service: entities/npc-simulation-service.md
      - FW Config Service: entities/fw-config-service.md
      - FW Scene Router: entities/fw-scene-router.md
      - FW State Machine: entities/fw-state-machine.md
    - Core Systems:
      - Flight Controller: entities/flight-controller.md
  - Concepts:
    - Architecture & Systems:
      - Project Architecture: concepts/project-architecture.md
      - AI Subsystem: concepts/ai-subsystem.md
      - Combat System: concepts/combat-system.md
      - Networking & Multiplayer: concepts/networking-multiplayer.md
      - Ship Systems: concepts/ship-systems.md
      - FW Framework Addon: concepts/fw-framework-addon.md
      - UI & HUD Subsystems: concepts/ui-hud-subsystems.md
      - VFX & Visual Effects: concepts/vfx-visual-effects.md
    - World & Content:
      - World Generation: concepts/world-generation.md
      - Backdrop System: concepts/backdrop-system.md
      - Factions & Lore: concepts/factions-lore.md
      - Ships, Parts & Lore: concepts/ships-parts-lore.md
      - Weapons & Lore: concepts/weapons-lore.md
      - NPCs & Patrols: concepts/npcs-patrols-lore.md
      - Stations & Megastructures: concepts/stations-megastructures.md
      - Galaxy & Celestial Bodies: concepts/galaxy-celestial-bodies.md
      - Economy & Trade: concepts/economy-trade.md
      - Discovery & Exploration: concepts/discovery-exploration.md
